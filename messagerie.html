<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messagerie — Galy Market</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#0f0c08;color:#fdf8f0;padding-bottom:70px}
    .gz-header{background:linear-gradient(135deg,#0f0c08,#1a1206);border-bottom:2px solid #f68b1e;padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
    .gz-back{background:rgba(255,255,255,.2);border:none;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;text-decoration:none}
    .gz-header-title{color:#fff;font-size:16px;font-weight:800;flex:1}
    /* LISTE CONVERSATIONS */
    .gz-conv-item{background:#1a1206;display:flex;gap:12px;padding:14px;border-bottom:1px solid rgba(246,139,30,.1);cursor:pointer;align-items:center;transition:background .15s}
    .gz-conv-item:hover{background:rgba(246,139,30,.04)}
    .gz-conv-item.unread{background:rgba(246,139,30,.08)}
    .gz-conv-avatar{width:48px;height:48px;border-radius:50%;background:rgba(246,139,30,.08);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
    .gz-conv-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .gz-conv-info{flex:1;min-width:0}
    .gz-conv-nom{font-size:14px;font-weight:700;margin-bottom:2px}
    .gz-conv-last{font-size:12px;color:#8a7560;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .gz-conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .gz-conv-time{font-size:10px;color:#6b5d4f}
    .gz-conv-badge{background:#f68b1e;color:#fff;font-size:9px;font-weight:800;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    /* CHAT */
    .gz-chat{display:none;flex-direction:column;height:100vh;background:#0f0c08}
    .gz-chat.open{display:flex}
    .gz-chat-header{background:linear-gradient(135deg,#0f0c08,#1a1206);border-bottom:2px solid #f68b1e;padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
    .gz-chat-avatar{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
    .gz-chat-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .gz-chat-nom{color:#fff;font-size:14px;font-weight:700}
    .gz-chat-sub{color:rgba(255,255,255,.7);font-size:10px}
    .gz-chat-actions{margin-left:auto;display:flex;gap:8px}
    .gz-chat-wa{background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:6px 10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px}
    /* MESSAGES */
    .gz-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
    .gz-msg{display:flex;flex-direction:column;max-width:75%}
    .gz-msg.me{align-self:flex-end;align-items:flex-end}
    .gz-msg.them{align-self:flex-start;align-items:flex-start}
    .gz-msg-bubble{padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word}
    .gz-msg.me .gz-msg-bubble{background:#f68b1e;color:#fff;border-bottom-right-radius:4px}
    .gz-msg.them .gz-msg-bubble{background:#1a1206;color:#fdf8f0;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .gz-msg-time{font-size:10px;color:#6b5d4f;margin-top:2px;padding:0 4px}
    /* ANNONCE PARTAGÉE */
    .gz-msg-ann{background:rgba(246,139,30,.04);border:1px solid rgba(246,139,30,.15);border-radius:10px;padding:8px;margin-bottom:4px;display:flex;gap:8px;align-items:center;cursor:pointer}
    .gz-msg-ann img,.gz-msg-ann-emoji{width:44px;height:44px;border-radius:6px;object-fit:cover;background:rgba(246,139,30,.08);display:flex;align-items:center;justify-content:center;font-size:20px}
    .gz-msg-ann-info{flex:1;min-width:0}
    .gz-msg-ann-titre{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .gz-msg-ann-prix{font-size:12px;font-weight:800;color:#f68b1e}
    /* INPUT */
    .gz-chat-input{background:#1a1206;padding:8px 12px;display:flex;gap:8px;align-items:center;border-top:1px solid rgba(246,139,30,.15);flex-shrink:0}
    .gz-chat-input input{flex:1;background:rgba(246,139,30,.06);border:none;border-radius:20px;padding:10px 14px;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;color:#fdf8f0}
    .gz-chat-send{background:#f68b1e;border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px;flex-shrink:0}
    .gz-chat-wa-btn{background:#25d366;border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px;flex-shrink:0}
    /* BOTTOM NAV */
    .gz-nav{position:fixed;bottom:0;left:0;right:0;background:#0f0c08;border-top:1px solid rgba(246,139,30,.2);display:flex;z-index:200;box-shadow:0 -2px 6px rgba(0,0,0,.06)}
    .gz-nitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 4px;text-decoration:none;color:#8a7560;font-size:9px;font-weight:600;gap:2px}
    .gz-nitem i{font-size:19px}
    .gz-npub{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none}
    .gz-npub-icon{width:42px;height:42px;background:#f68b1e;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-14px;box-shadow:0 3px 10px rgba(246,139,30,.4)}
    .gz-npub-icon i{font-size:19px;color:#fff}
    .gz-npub span{font-size:9px;font-weight:600;color:#f68b1e}
    .gz-empty{text-align:center;padding:60px 20px;color:#6b5d4f}
    .gz-empty i{font-size:48px;display:block;margin-bottom:14px;opacity:.3}
  </style>
</head>
<body>
</div>
  </div>


<!-- LISTE CONVERSATIONS -->
<div id="listePage">
  <header class="gz-header">
    <a href="account.html" class="gz-back"><i class="fas fa-arrow-left"></i></a>
    <span class="gz-header-title">Messagerie</span>
    <span id="convCount" style="background:rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px">0</span>
  </header>
  <div id="convList"></div>
</div>

<!-- CHAT -->
<div class="gz-chat" id="chatPage">
  <div class="gz-chat-header">
    <button class="gz-back" onclick="fermerChat()"><i class="fas fa-arrow-left"></i></button>
    <div class="gz-chat-avatar" id="chatAvatar">👤</div>
    <div>
      <div class="gz-chat-nom" id="chatNom">—</div>
      <div class="gz-chat-sub" id="chatSub">Vendeur</div>
    </div>
    <div class="gz-chat-actions">
      <button class="gz-chat-wa" id="chatWaBtn" onclick="ouvrirWA()"><i class="fab fa-whatsapp"></i> WA</button>
    </div>
  </div>
  <div class="gz-messages" id="chatMessages"></div>
  <div class="gz-chat-input">
    <input type="text" id="msgInput" placeholder="Écrire un message..." onkeydown="if(event.key==='Enter')envoyerMsg()">
    <button class="gz-chat-wa-btn" onclick="ouvrirWA()" title="WhatsApp"><i class="fab fa-whatsapp"></i></button>
    <button class="gz-chat-send" onclick="envoyerMsg()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="gz-nav">
  <a href="index.html" class="gz-nitem"><i class="fas fa-home"></i><span>Accueil</span></a>
  <a href="annonces.html" class="gz-nitem"><i class="fas fa-tag"></i><span>Offres</span></a>
  <a href="publier-annonce.html" class="gz-npub"><div class="gz-npub-icon"><i class="fas fa-plus"></i></div><span>Publier</span></a>
  <a href="boutiques.html" class="gz-nitem"><i class="fas fa-store"></i><span>Boutiques</span></a>
  <a href="account.html" class="gz-nitem"><i class="fas fa-user"></i><span>Compte</span></a>
</nav>

<script src="js/annonces.js"></script>
<script>
const MSG_KEY='GM_MESSAGES';
const fmt=n=>(n||0).toLocaleString('fr-FR')+' GNF';
const EMOJI_MAP={immobilier:'🏠',vehicules:'🚗',phones:'📱',informatique:'💻',mode:'👕',electromenager:'🔌',emploi:'💼',meubles:'🛋️',bijoux:'💍',beaute:'💄',autres:'📦'};

let currentConvId=null;
let currentVendeur={};

function timeAgo(d){const diff=Date.now()-new Date(d).getTime();const h=Math.floor(diff/3600000);if(h<1)return"À l'instant";if(h<24)return`Il y a ${h}h`;const j=Math.floor(h/24);if(j<7)return`Il y a ${j}j`;return new Date(d).toLocaleDateString('fr-FR');}

function getMsgs(){return JSON.parse(localStorage.getItem(MSG_KEY)||'{}');}
function saveMsgs(m){localStorage.setItem(MSG_KEY,JSON.stringify(m));}

function getVendFromId(vid){
  const vends=typeof getVendeurs==='function'?getVendeurs():JSON.parse(localStorage.getItem('GM_VENDEURS')||'[]');
  return vends.find(v=>v.id===vid)||{nom:'Vendeur',avatar:'👤'};
}

function renderConvList(){
  const msgs=getMsgs();
  const convIds=Object.keys(msgs);
  const count=document.getElementById('convCount');
  if(count)count.textContent=convIds.length;
  const list=document.getElementById('convList');
  if(!list)return;
  if(!convIds.length){list.innerHTML=`<div class="gz-empty"><i class="fas fa-comment-dots"></i><p>Aucune conversation</p><p style="font-size:11px;margin-top:8px">Contactez un vendeur depuis une annonce</p></div>`;return;}
  list.innerHTML=convIds.map(cid=>{
    const conv=msgs[cid];const messages=conv.messages||[];
    const last=messages[messages.length-1]||{};
    const vend=getVendFromId(cid);
    const unread=(conv.unread||0)>0;
    return`<div class="gz-conv-item ${unread?'unread':''}" onclick="ouvrirChat('${cid}')">
      <div class="gz-conv-avatar">${vend.avatar&&vend.avatar.startsWith('data:')?`<img src="${vend.avatar}">`:(vend.avatar||'👤')}</div>
      <div class="gz-conv-info">
        <div class="gz-conv-nom">${vend.nom||'Vendeur'}</div>
        <div class="gz-conv-last">${last.text||'Aucun message'}</div>
      </div>
      <div class="gz-conv-meta">
        <span class="gz-conv-time">${last.date?timeAgo(last.date):''}</span>
        ${unread?`<span class="gz-conv-badge">${conv.unread}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

window.ouvrirChat=function(vendeurId){
  currentConvId=vendeurId;
  currentVendeur=getVendFromId(vendeurId);
  document.getElementById('listePage').style.display='none';
  document.getElementById('chatPage').classList.add('open');
  // Header
  const av=document.getElementById('chatAvatar');
  if(currentVendeur.avatar&&currentVendeur.avatar.startsWith('data:'))av.innerHTML=`<img src="${currentVendeur.avatar}">`;
  else av.textContent=currentVendeur.avatar||'👤';
  document.getElementById('chatNom').textContent=currentVendeur.nom||'Vendeur';
  document.getElementById('chatSub').textContent=currentVendeur.ville||'Vendeur';
  // Marquer comme lu
  const msgs=getMsgs();
  if(msgs[vendeurId])msgs[vendeurId].unread=0;
  saveMsgs(msgs);
  renderMessages();
};

function fermerChat(){
  document.getElementById('chatPage').classList.remove('open');
  document.getElementById('listePage').style.display='block';
  renderConvList();
}

function renderMessages(){
  const msgs=getMsgs();
  const conv=msgs[currentConvId]||{messages:[]};
  const container=document.getElementById('chatMessages');
  if(!container)return;
  if(!conv.messages.length){container.innerHTML=`<div style="text-align:center;padding:20px;color:#6b5d4f;font-size:12px">Démarrez la conversation !</div>`;return;}
  container.innerHTML=conv.messages.map(m=>{
    const isMe=m.from==='me';
    let annHtml='';
    if(m.ann){
      const a=m.ann;
      annHtml=`<div class="gz-msg-ann" onclick="window.location.href='annonces.html?ann=${a.id}'">
        <div class="gz-msg-ann-emoji">${EMOJI_MAP[a.cat]||'📦'}</div>
        <div class="gz-msg-ann-info"><div class="gz-msg-ann-titre">${a.titre}</div><div class="gz-msg-ann-prix">${a.prix>0?fmt(a.prix):'Gratuit'}</div></div>
      </div>`;
    }
    return`<div class="gz-msg ${isMe?'me':'them'}">
      ${annHtml}
      <div class="gz-msg-bubble">${m.text}</div>
      <span class="gz-msg-time">${timeAgo(m.date)}</span>
    </div>`;
  }).join('');
  container.scrollTop=container.scrollHeight;
}

window.envoyerMsg=function(){
  const input=document.getElementById('msgInput');
  const text=input?.value.trim();
  if(!text||!currentConvId)return;
  const msgs=getMsgs();
  if(!msgs[currentConvId])msgs[currentConvId]={messages:[],unread:0};
  msgs[currentConvId].messages.push({from:'me',text,date:new Date().toISOString()});
  saveMsgs(msgs);
  if(input)input.value='';
  renderMessages();
};

window.ouvrirWA=function(){
  if(!currentVendeur)return;
  const tel=(currentVendeur.wa||currentVendeur.tel||'').replace(/[^0-9]/g,'');
  if(!tel)return;
  window.open(`https://wa.me/${tel}?text=${encodeURIComponent('Bonjour, je vous contacte depuis Galy Market !')}`, '_blank');
};

// Ouvrir directement un chat depuis URL ?vendeur=id
const params=new URLSearchParams(window.location.search);
const vendParam=params.get('vendeur');
const annParam=params.get('ann');

document.addEventListener('DOMContentLoaded',function(){
  if(vendParam){
    // Créer conv si n'existe pas
    const msgs=getMsgs();
    if(!msgs[vendParam])msgs[vendParam]={messages:[],unread:0};
    // Si annonce jointe
    if(annParam&&typeof getAnnonces==='function'){
      const ann=getAnnonces().find(a=>a.id===annParam);
      if(ann){
        msgs[vendParam].messages.push({from:'me',text:'Bonjour, je suis intéressé par cette annonce.',date:new Date().toISOString(),ann:{id:ann.id,titre:ann.titre,prix:ann.prix,cat:ann.cat}});
      }
    }
    saveMsgs(msgs);
    setTimeout(()=>ouvrirChat(vendParam),100);
  } else {
    renderConvList();
  }
});
</script>
</body>
</html>
