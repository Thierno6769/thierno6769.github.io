<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Galy Market — App Livreur</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--gold:#f68b1e;--gold-d:#d4780f;--dark:#0a0e1a;--dark2:#111827;--dark3:#1e293b;--cream:#f8fafc;--muted:#64748b;--green:#22c55e;--red:#ef4444;--blue:#3498db;--radius:14px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;max-width:480px;margin:0 auto;}
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.login-role{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:40px;}
.login-card{background:var(--dark2);border:1px solid rgba(246,139,30,.2);border-radius:20px;padding:28px;width:100%;}
.login-title{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center;}
.input-group{margin-bottom:14px;}
.input-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
.input-field{width:100%;background:rgba(246,139,30,.06);border:1px solid rgba(246,139,30,.15);border-radius:10px;padding:13px 16px;font-size:15px;color:var(--cream);font-family:'DM Sans',sans-serif;outline:none;}
.input-field:focus{border-color:var(--gold);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#1a0f00;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;}
.app{display:none;}
.app.visible{display:flex;flex-direction:column;min-height:100vh;}
.app-header{background:var(--dark2);border-bottom:1px solid rgba(246,139,30,.15);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.app-logo-sm{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);}
.app-role-tag{font-size:10px;background:rgba(246,139,30,.15);color:var(--gold);padding:3px 10px;border-radius:50px;letter-spacing:1px;font-weight:600;}
.app-header-right{display:flex;align-items:center;gap:12px;}
.notif-btn{position:relative;width:36px;height:36px;border-radius:50%;background:rgba(246,139,30,.1);border:none;color:var(--gold);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.notif-dot{position:absolute;top:4px;right:4px;width:10px;height:10px;border-radius:50%;background:var(--red);border:2px solid var(--dark2);display:none;}
.notif-dot.active{display:block;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.emp-name-tag{font-size:13px;font-weight:600;}
.btn-decon{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--dark2);border-top:1px solid rgba(246,139,30,.12);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:50;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;border:none;background:none;font-family:'DM Sans',sans-serif;transition:color .2s;position:relative;}
.bn-item.active{color:var(--gold);}
.bn-item i{font-size:20px;}
.bn-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:50px;padding:1px 5px;min-width:16px;text-align:center;}
.scroll-content{flex:1;overflow-y:auto;padding:16px 16px 80px;}
.section-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
/* LIVRAISON CARD */
.livr-card{background:var(--dark2);border:2px solid rgba(246,139,30,.3);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;position:relative;}
.livr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-d));}
.livr-header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.livr-type{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:6px;}
.livr-time{font-size:10px;color:var(--muted);}
.livr-body{padding:0 16px 16px;}
/* CLIENT INFO */
.client-block{background:rgba(246,139,30,.06);border:1px solid rgba(246,139,30,.12);border-radius:10px;padding:14px;margin-bottom:14px;}
.client-name{font-size:17px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.client-info-row{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(248,250,252,.8);margin-bottom:6px;}
.client-info-row i{color:var(--gold);width:16px;text-align:center;}
.client-info-row:last-child{margin-bottom:0;}
/* MAP LINK */
.map-link{display:flex;align-items:center;gap:8px;background:rgba(52,152,219,.1);border:1px solid rgba(52,152,219,.2);border-radius:8px;padding:10px 14px;text-decoration:none;color:var(--blue);font-size:13px;font-weight:600;margin-bottom:14px;transition:all .2s;}
.map-link:hover{background:rgba(52,152,219,.2);}
/* CALL BTN */
.call-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:10px;color:var(--green);font-size:13px;font-weight:600;margin-bottom:14px;text-decoration:none;}
/* PRODUITS */
.livr-produits{background:var(--dark3);border-radius:8px;padding:10px 12px;margin-bottom:14px;}
.livr-produit{font-size:12px;padding:4px 0;border-bottom:1px solid rgba(246,139,30,.06);display:flex;justify-content:space-between;}
.livr-produit:last-child{border:none;}
.livr-total{font-size:14px;font-weight:700;color:var(--gold);margin-top:4px;}
.livr-paiement{font-size:11px;color:var(--muted);}
/* BOUTONS */
.btn-prendre{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#1a0f00;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.btn-prendre:active{transform:scale(.97);}
/* EN COURS */
.en-cours-card{background:linear-gradient(135deg,rgba(246,139,30,.12),rgba(246,139,30,.04));border:2px solid rgba(246,139,30,.4);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.en-cours-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(246,139,30,.2);color:var(--gold);font-size:10px;font-weight:700;padding:4px 12px;border-radius:50px;margin-bottom:12px;animation:pulse 1.5s infinite;}
.btn-confirmer{width:100%;background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;}
.montant-input{width:100%;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:12px;font-size:15px;color:var(--cream);font-family:'DM Sans',sans-serif;outline:none;margin-top:8px;text-align:center;}
/* HISTORIQUE */
.hist-card{background:var(--dark2);border:1px solid rgba(246,139,30,.08);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hist-ref{font-size:10px;color:var(--gold);font-family:monospace;}
.hist-date{font-size:10px;color:var(--muted);}
.hist-client{font-weight:700;font-size:14px;margin-bottom:2px;}
.hist-lieu{font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.hist-montant{font-size:14px;color:var(--green);font-weight:700;}
/* PERF */
.perf-period{display:flex;gap:6px;margin-bottom:20px;}
.period-btn{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(246,139,30,.15);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.period-btn.active{background:var(--gold);border-color:var(--gold);color:#1a0f00;}
.perf-big{background:var(--dark2);border:1px solid rgba(246,139,30,.15);border-radius:16px;padding:24px;text-align:center;margin-bottom:12px;}
.perf-big-n{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--gold);line-height:1;}
.perf-big-l{font-size:12px;color:var(--muted);margin-top:4px;}
.stat-mini{background:var(--dark2);border:1px solid rgba(246,139,30,.1);border-radius:14px;padding:16px;text-align:center;}
.stat-mini-n{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);line-height:1;}
.stat-mini-l{font-size:10px;color:var(--muted);margin-top:2px;}
.empty-notifs{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-notifs i{font-size:48px;margin-bottom:16px;opacity:.3;display:block;}
</style>

  <!-- ═══ PWA META ═══ -->
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="GM Livreur"/>
  <meta name="theme-color" content="#f68b1e"/>
  <meta name="application-name" content="GM Livreur"/>
  <link rel="manifest" href="manifest-livreur.json"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png"/>
  <!-- ═══ FIN PWA META ═══ -->
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-logo">GALY</div>
  <div class="login-role">App Livreur</div>
  <div class="login-card">
    <div class="login-title"><i class="fas fa-motorcycle" style="color:var(--gold);margin-right:8px"></i>Connexion</div>
    <div class="input-group"><label class="input-label">Login</label><input type="text" id="loginInput" class="input-field" placeholder="votre.login"/></div>
    <div class="input-group"><label class="input-label">Mot de passe</label><input type="password" id="mdpInput" class="input-field" placeholder="••••••••"/></div>
    <p id="loginErr" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none">Login ou mot de passe incorrect</p>
    <button class="btn-login" onclick="seConnecter()">Se connecter</button>
  </div>
</div>

<div id="appScreen" class="app">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="app-logo-sm">GALY</div>
      <div class="app-role-tag"><i class="fas fa-motorcycle"></i> Livreur</div>
    </div>
    <div class="app-header-right">
      <button class="notif-btn" onclick="showSection('notifs')">
        <i class="fas fa-bell"></i>
        <div class="notif-dot" id="notifDot"></div>
      </button>
      <div>
        <div class="emp-name-tag" id="empNameTag">—</div>
        <button class="btn-decon" onclick="deconnecter()">Déconnexion</button>
      </div>
    </div>
  </div>

  <div class="scroll-content" id="mainContent"></div>

  <nav class="bottom-nav">
    <button class="bn-item active" onclick="showSection('notifs')" id="bnNotifs">
      <i class="fas fa-bell"></i><span>Livraisons</span>
      <span class="bn-badge" id="bnBadge" style="display:none"></span>
    </button>
    <button class="bn-item" onclick="showSection('historique')" id="bnHistorique">
      <i class="fas fa-route"></i><span>Historique</span>
    </button>
    <button class="bn-item" onclick="showSection('perf')" id="bnPerf">
      <i class="fas fa-chart-bar"></i><span>Mes perfs</span>
    </button>
  </nav>
</div>

<script src="js/employes-core.js"></script>
<script>
const {GM, AuthEmp, NotifSystem, Workflow, EmployeManager, Stats} = window.GALY;
let session = null;
let currentPeriode = 'jour';
let activeLivraison = null;

function seConnecter() { window.location.href = "login.html"; }

function deconnecter() { AuthEmp.deconnecter(); location.reload(); }

function refreshBadge() {
  const count = NotifSystem.countNonLues(session.empId, 'LIVREUR');
  const dot = document.getElementById('notifDot');
  const badge = document.getElementById('bnBadge');
  dot.classList.toggle('active', count > 0);
  badge.style.display = count > 0 ? 'block' : 'none';
  badge.textContent = count;
}

function showSection(s) {
  document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
  document.getElementById('bn'+s.charAt(0).toUpperCase()+s.slice(1)).classList.add('active');
  if (s==='notifs') renderNotifs();
  else if (s==='historique') renderHistorique();
  else renderPerf();
}

function renderNotifs() {
  const notifs = NotifSystem.pourEmploye(session.empId, 'LIVREUR');
  const content = document.getElementById('mainContent');

  // Vérifier si le livreur a une livraison en cours
  const cmds = GM.getCommandesEmp();
  activeLivraison = cmds.find(c => c.livreurId === session.empId && c.wfStatut === 'en_livraison') || null;

  let html = '';

  // Livraison active en cours
  if (activeLivraison) {
    html += `<div class="en-cours-card">
      <div class="en-cours-badge"><i class="fas fa-motorcycle"></i> LIVRAISON EN COURS</div>
      <div class="client-name"><i class="fas fa-user" style="color:var(--gold)"></i> ${activeLivraison.client?.prenom} ${activeLivraison.client?.nom}</div>
      <div class="client-info-row"><i class="fas fa-phone"></i> ${activeLivraison.client?.tel}</div>
      <div class="client-info-row"><i class="fas fa-location-dot"></i> ${activeLivraison.adresse?.quartier||''}, ${activeLivraison.adresse?.ville||'Conakry'}</div>
      ${activeLivraison.coordonnees ? `<a href="https://maps.google.com/?q=${encodeURIComponent(activeLivraison.coordonnees)}" class="map-link" target="_blank"><i class="fas fa-map-location-dot"></i> Ouvrir dans Google Maps</a>` : ''}
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Montant à encaisser :</div>
      <input type="number" id="montantInput" class="montant-input" placeholder="${activeLivraison.total}" value="${activeLivraison.total}"/>
      <button class="btn-confirmer" onclick="confirmerLivraison()">
        <i class="fas fa-check-double"></i> Confirmer la livraison effectuée
      </button>
    </div>`;
  }

  // Nouvelles demandes
  if (!notifs.length && !activeLivraison) {
    html = `<div class="empty-notifs"><i class="fas fa-motorcycle"></i>Aucune livraison disponible<br><small>Les demandes de livraison apparaîtront ici</small></div>`;
  } else if (notifs.length) {
    html += `<div class="section-title"><i class="fas fa-bell" style="color:var(--gold)"></i> Livraisons disponibles (${notifs.length})</div>
      ${notifs.map(n => {
        const p = n.payload;
        const mapsUrl = p.coordonnees ? `https://maps.google.com/?q=${encodeURIComponent(p.coordonnees)}` : `https://maps.google.com/?q=${encodeURIComponent((p.adresse?.quartier||'')+' Conakry Guinée')}`;
        const pmLabel = {cash:'💵 Cash à la livraison', orange:'📱 Orange Money (déjà payé)', mtn:'📱 MTN Money (déjà payé)'}[p.paiement] || p.paiement;
        return `<div class="livr-card">
          <div class="livr-header">
            <div class="livr-type"><i class="fas fa-box"></i> NOUVELLE LIVRAISON</div>
            <div class="livr-time">${timeAgo(n.timestamp)}</div>
          </div>
          <div class="livr-body">
            <div class="client-block">
              <div class="client-name"><i class="fas fa-user"></i> ${p.client?.prenom} ${p.client?.nom}</div>
              <div class="client-info-row"><i class="fas fa-phone"></i> ${p.client?.tel}</div>
              <div class="client-info-row"><i class="fas fa-location-dot"></i> ${p.adresse?.quartier||''}, ${p.adresse?.ville||'Conakry'}</div>
              ${p.coordonnees ? `<div class="client-info-row"><i class="fas fa-crosshairs"></i> <small style="font-family:monospace">${p.coordonnees}</small></div>` : ''}
            </div>
            <a href="${mapsUrl}" class="map-link" target="_blank"><i class="fas fa-map-location-dot"></i> Voir l'emplacement sur la carte</a>
            <a href="tel:${p.client?.tel}" class="call-btn"><i class="fas fa-phone"></i> Appeler le client</a>
            <div class="livr-produits">
              <div style="font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase">Produits à livrer</div>
              ${(p.produits||[]).map(pr=>`<div class="livr-produit"><span>${pr.nom}</span><span>×${pr.qte}</span></div>`).join('')}
              <div class="livr-total">Total : ${fmtGNF(p.total)}</div>
              <div class="livr-paiement">${pmLabel}</div>
            </div>
            <button class="btn-prendre" onclick="accepterLivraison('${n.id}')">
              <i class="fas fa-motorcycle"></i> Prendre cette livraison
            </button>
          </div>
        </div>`;
      }).join('')}`;
  }

  content.innerHTML = html;
}

function accepterLivraison(notifId) {
  const result = Workflow.livreurAccepte(notifId, session.empId);
  if (!result) { showToast('Cette livraison a déjà été prise !', 'error'); renderNotifs(); return; }
  activeLivraison = result;
  showToast('Livraison acceptée ✅ Bonne route !');
  renderNotifs();
  refreshBadge();
}

function confirmerLivraison() {
  if (!activeLivraison) return;
  const montant = parseFloat(document.getElementById('montantInput')?.value) || activeLivraison.total;
  Workflow.livreurConfirme(activeLivraison.wfId, session.empId, montant);
  activeLivraison = null;
  showToast('Livraison confirmée 🎉 +' + fmtGNF(montant));
  renderNotifs();
}

function renderHistorique() {
  const tb = EmployeManager.getTB(session.empId);
  const livs = tb ? [...tb.livraisonsEffectuees].reverse() : [];
  const content = document.getElementById('mainContent');
  if (!livs.length) {
    content.innerHTML = `<div class="empty-notifs"><i class="fas fa-route"></i>Aucune livraison effectuée pour l'instant</div>`;
    return;
  }
  content.innerHTML = `<div class="section-title"><i class="fas fa-route" style="color:var(--gold)"></i> Mes livraisons (${livs.length})</div>
    ${livs.map((l,i) => `<div class="hist-card">
      <div class="hist-header">
        <div class="hist-ref">${l.wfId}</div>
        <div class="hist-date">${new Date(l.date).toLocaleDateString('fr-FR')} ${new Date(l.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div class="hist-lieu"><i class="fas fa-location-dot" style="color:var(--gold)"></i> ${l.adresse?.quartier||'Conakry'}, ${l.adresse?.ville||''}</div>
      <div class="hist-montant">💰 ${fmtGNF(l.montant)} encaissés</div>
    </div>`).join('')}`;
}

function renderPerf() {
  const content = document.getElementById('mainContent');
  const stats = Stats.livreurStats(session.empId, currentPeriode);
  const tb = EmployeManager.getTB(session.empId);
  const lieux = stats.lieux.slice(-5);
  content.innerHTML = `
    <div class="perf-period">
      ${['jour','semaine','mois'].map(p=>`<button class="period-btn ${p===currentPeriode?'active':''}" onclick="setPeriode('${p}')">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`).join('')}
    </div>
    <div class="perf-big">
      <div class="perf-big-n">${stats.livraisons}</div>
      <div class="perf-big-l">Livraisons effectuées ce ${currentPeriode}</div>
    </div>
    <div class="perf-big" style="border-color:rgba(34,197,94,.2)">
      <div class="perf-big-n" style="color:var(--green)">${fmtGNF(stats.ca)}</div>
      <div class="perf-big-l">Montant encaissé</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      ${['jour','semaine','mois'].map(p=>{const s=Stats.livreurStats(session.empId,p);return`<div class="stat-mini"><div class="stat-mini-n">${s.livraisons}</div><div class="stat-mini-l">Ce ${p}</div></div>`;}).join('')}
    </div>
    ${lieux.length ? `
      <div class="section-title" style="margin-top:8px"><i class="fas fa-location-dot" style="color:var(--gold)"></i> Derniers lieux de livraison</div>
      ${lieux.map(l=>`<div class="hist-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="hist-lieu" style="margin:0"><i class="fas fa-location-dot" style="color:var(--gold)"></i> ${l.adresse?.quartier||'Conakry'}</div>
          <div class="hist-montant">${fmtGNF(l.montant)}</div>
        </div>
        <div class="hist-date" style="margin-top:4px">${new Date(l.date).toLocaleDateString('fr-FR')}</div>
      </div>`).join('')}` : ''}`;
}

function setPeriode(p) { currentPeriode = p; renderPerf(); }
function fmtGNF(n) { return (Number(n)||0).toLocaleString('fr-FR') + ' GNF'; }
function timeAgo(ts) { const d=Math.floor((Date.now()-new Date(ts))/1000); if(d<60)return'il y a '+d+'s'; if(d<3600)return'il y a '+Math.floor(d/60)+'min'; return'il y a '+Math.floor(d/3600)+'h'; }
function showToast(msg, type='success') {
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:${type==='error'?'var(--red)':'var(--gold)'};color:${type==='error'?'#fff':'#1a0f00'};padding:12px 24px;border-radius:50px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap`;
  t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}

const s = AuthEmp.getSession();
if (!s || s.role !== 'LIVREUR') {
  window.location.href = 'login.html';
}
if (s && s.role === 'LIVREUR') {
  session = s;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').className='app visible';
  document.getElementById('empNameTag').textContent=s.prenom+' '+s.nom;
  showSection('notifs');
  setInterval(refreshBadge,3000); refreshBadge();
}
</script>
