<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Galy Market — App Stock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--purple:#9b59b6;--purple-d:#8e44ad;--dark:#0a0e1a;--dark2:#111827;--dark3:#1e293b;--cream:#f8fafc;--muted:#64748b;--green:#22c55e;--red:#ef4444;--gold:#f68b1e;--blue:#3498db;--radius:14px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;max-width:480px;margin:0 auto;}
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;background:linear-gradient(135deg,#fff,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.login-role{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--purple);margin-bottom:40px;}
.login-card{background:var(--dark2);border:1px solid rgba(155,89,182,.2);border-radius:20px;padding:28px;width:100%;}
.login-title{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center;}
.input-group{margin-bottom:14px;}
.input-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
.input-field{width:100%;background:rgba(155,89,182,.06);border:1px solid rgba(155,89,182,.15);border-radius:10px;padding:13px 16px;font-size:15px;color:var(--cream);font-family:'DM Sans',sans-serif;outline:none;}
.input-field:focus{border-color:var(--purple);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--purple),var(--purple-d));color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;}
.app{display:none;}
.app.visible{display:flex;flex-direction:column;min-height:100vh;}
.app-header{background:var(--dark2);border-bottom:1px solid rgba(155,89,182,.15);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.app-logo-sm{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--purple);}
.app-role-tag{font-size:10px;background:rgba(155,89,182,.15);color:var(--purple);padding:3px 10px;border-radius:50px;letter-spacing:1px;font-weight:600;}
.app-header-right{display:flex;align-items:center;gap:12px;}
.notif-btn{position:relative;width:36px;height:36px;border-radius:50%;background:rgba(155,89,182,.1);border:none;color:var(--purple);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.notif-dot{position:absolute;top:4px;right:4px;width:10px;height:10px;border-radius:50%;background:var(--red);border:2px solid var(--dark2);display:none;}
.notif-dot.active{display:block;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.emp-name-tag{font-size:13px;font-weight:600;}
.btn-decon{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--dark2);border-top:1px solid rgba(155,89,182,.12);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:50;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;border:none;background:none;font-family:'DM Sans',sans-serif;transition:color .2s;position:relative;}
.bn-item.active{color:var(--purple);}
.bn-item i{font-size:20px;}
.bn-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:50px;padding:1px 5px;min-width:16px;text-align:center;}
.scroll-content{flex:1;overflow-y:auto;padding:16px 16px 80px;}
.section-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
/* NOTIF STOCK */
.notif-card{background:var(--dark2);border:1px solid rgba(155,89,182,.2);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.notif-card.urgent{border-color:rgba(246,139,30,.4);background:rgba(246,139,30,.03);}
.notif-header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.notif-type{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px;color:var(--purple);}
.notif-time{font-size:10px;color:var(--muted);}
.notif-body{padding:0 16px 16px;}
.notif-gc{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.notif-produits{background:rgba(155,89,182,.06);border-radius:8px;padding:10px 12px;margin-bottom:14px;}
.notif-produit-item{font-size:13px;font-weight:600;padding:4px 0;border-bottom:1px solid rgba(155,89,182,.08);display:flex;justify-content:space-between;}
.notif-produit-item:last-child{border:none;}
/* BOUTONS STOCK */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-dispo{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-indispo{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red);border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-dispo:active,.btn-indispo:active{transform:scale(.97);}
/* STOCK PRODUITS */
.stock-card{background:var(--dark2);border:1px solid rgba(155,89,182,.1);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.stock-icon{width:44px;height:44px;border-radius:10px;background:rgba(155,89,182,.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.stock-info{flex:1;}
.stock-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.stock-qty{font-size:13px;}
.stock-qty.ok{color:var(--green);}
.stock-qty.low{color:var(--gold);}
.stock-qty.zero{color:var(--red);}
.stock-badge{font-size:10px;padding:3px 10px;border-radius:50px;font-weight:600;flex-shrink:0;}
.badge-ok{background:rgba(34,197,94,.15);color:var(--green);}
.badge-low{background:rgba(246,139,30,.15);color:var(--gold);}
.badge-zero{background:rgba(239,68,68,.15);color:var(--red);}
/* PERF */
.perf-period{display:flex;gap:6px;margin-bottom:20px;}
.period-btn{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(155,89,182,.15);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.period-btn.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.perf-big{background:var(--dark2);border:1px solid rgba(155,89,182,.15);border-radius:16px;padding:24px;text-align:center;margin-bottom:12px;}
.perf-big-n{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--purple);line-height:1;}
.perf-big-l{font-size:12px;color:var(--muted);margin-top:4px;}
.stat-mini{background:var(--dark2);border:1px solid rgba(155,89,182,.1);border-radius:14px;padding:16px;text-align:center;}
.stat-mini-n{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--purple);line-height:1;}
.stat-mini-l{font-size:10px;color:var(--muted);margin-top:2px;}
.empty-notifs{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-notifs i{font-size:48px;margin-bottom:16px;opacity:.3;display:block;}
</style>

  <!-- ═══ PWA META ═══ -->
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="GM Stock"/>
  <meta name="theme-color" content="#9b59b6"/>
  <meta name="application-name" content="GM Stock"/>
  <link rel="manifest" href="manifest-stock.json"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png"/>
  <!-- ═══ FIN PWA META ═══ -->
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-logo">GALY</div>
  <div class="login-role">App Stock</div>
  <div class="login-card">
    <div class="login-title"><i class="fas fa-boxes-stacked" style="color:var(--purple);margin-right:8px"></i>Connexion</div>
    <div class="input-group"><label class="input-label">Login</label><input type="text" id="loginInput" class="input-field" placeholder="votre.login"/></div>
    <div class="input-group"><label class="input-label">Mot de passe</label><input type="password" id="mdpInput" class="input-field" placeholder="••••••••"/></div>
    <p id="loginErr" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none">Login ou mot de passe incorrect</p>
    <button class="btn-login" onclick="seConnecter()">Se connecter</button>
  </div>
</div>

<div id="appScreen" class="app">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="app-logo-sm">GALY</div>
      <div class="app-role-tag"><i class="fas fa-boxes-stacked"></i> Stock</div>
    </div>
    <div class="app-header-right">
      <button class="notif-btn" onclick="showSection('notifs')">
        <i class="fas fa-bell"></i>
        <div class="notif-dot" id="notifDot"></div>
      </button>
      <div>
        <div class="emp-name-tag" id="empNameTag">—</div>
        <button class="btn-decon" onclick="deconnecter()">Déconnexion</button>
      </div>
    </div>
  </div>

  <div class="scroll-content" id="mainContent"></div>

  <nav class="bottom-nav">
    <button class="bn-item active" onclick="showSection('notifs')" id="bnNotifs">
      <i class="fas fa-bell"></i><span>Demandes</span>
      <span class="bn-badge" id="bnBadge" style="display:none"></span>
    </button>
    <button class="bn-item" onclick="showSection('stock')" id="bnStock">
      <i class="fas fa-warehouse"></i><span>Stock</span>
    </button>
    <button class="bn-item" onclick="showSection('perf')" id="bnPerf">
      <i class="fas fa-chart-bar"></i><span>Mes perfs</span>
    </button>
  </nav>
</div>

<script src="js/employes-core.js"></script>
<script>
const {GM, AuthEmp, NotifSystem, Workflow, EmployeManager, Stats} = window.GALY;
let session = null;
let currentPeriode = 'jour';

// Stock démo
const STOCK_DEMO = [
  {id:'P1',nom:'iPhone 15 Pro Max 256GB',stock:5,seuil:3,icon:'📱'},
  {id:'P2',nom:'Samsung Galaxy S24 Ultra',stock:2,seuil:3,icon:'📱'},
  {id:'P3',nom:'MacBook Pro M3',stock:1,seuil:2,icon:'💻'},
  {id:'P4',nom:'AirPods Pro 2',stock:0,seuil:5,icon:'🎧'},
  {id:'P5',nom:'iPad Air M2',stock:8,seuil:3,icon:'📟'},
];

function seConnecter() { window.location.href = "login.html"; }

function deconnecter() { AuthEmp.deconnecter(); location.reload(); }

function refreshBadge() {
  const count = NotifSystem.countNonLues(session.empId, 'GESTIONNAIRE_STOCK');
  const dot = document.getElementById('notifDot');
  const badge = document.getElementById('bnBadge');
  dot.classList.toggle('active', count > 0);
  badge.style.display = count > 0 ? 'block' : 'none';
  badge.textContent = count;
}

function showSection(s) {
  document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
  document.getElementById('bn'+s.charAt(0).toUpperCase()+s.slice(1)).classList.add('active');
  if (s==='notifs') renderNotifs();
  else if (s==='stock') renderStock();
  else renderPerf();
}

function renderNotifs() {
  const notifs = NotifSystem.pourEmploye(session.empId, 'GESTIONNAIRE_STOCK');
  const content = document.getElementById('mainContent');
  if (!notifs.length) {
    content.innerHTML = `<div class="empty-notifs"><i class="fas fa-boxes-stacked"></i>Aucune demande de vérification<br><small>Les demandes des gestionnaires de commandes apparaîtront ici</small></div>`;
    return;
  }
  content.innerHTML = `<div class="section-title"><i class="fas fa-bell" style="color:var(--purple)"></i> Demandes de vérification (${notifs.length})</div>
    ${notifs.map(n => {
      const p = n.payload;
      const gc = p.demandeur ? `${p.demandeur.prenom} ${p.demandeur.nom}` : 'Gestionnaire commandes';
      return `<div class="notif-card urgent">
        <div class="notif-header">
          <div class="notif-type"><i class="fas fa-exclamation-circle"></i> VÉRIFICATION REQUISE</div>
          <div class="notif-time">${timeAgo(n.timestamp)}</div>
        </div>
        <div class="notif-body">
          <div class="notif-gc"><i class="fas fa-user" style="color:var(--blue)"></i> Demandé par : ${gc}</div>
          <div class="notif-produits">
            <div style="font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase">Produits à vérifier</div>
            ${(p.produits||[]).map(pr=>`<div class="notif-produit-item"><span>${pr.nom}</span><span>×${pr.qte}</span></div>`).join('')}
          </div>
          <div class="btn-row">
            <button class="btn-dispo" onclick="confirmerStock('${n.id}',true)">
              <i class="fas fa-check"></i> Disponible
            </button>
            <button class="btn-indispo" onclick="confirmerStock('${n.id}',false)">
              <i class="fas fa-times"></i> Indisponible
            </button>
          </div>
        </div>
      </div>`;
    }).join('')}`;
}

function confirmerStock(notifId, disponible) {
  const result = Workflow.gsConfirmeStock(notifId, session.empId, disponible);
  if (!result) { showToast('Déjà prise par un autre gestionnaire', 'error'); renderNotifs(); return; }
  showToast(disponible ? 'Stock confirmé ✅ — Livreurs notifiés !' : 'Indisponibilité signalée ❌');
  renderNotifs();
  refreshBadge();
}

function renderStock() {
  const content = document.getElementById('mainContent');
  content.innerHTML = `<div class="section-title"><i class="fas fa-warehouse" style="color:var(--purple)"></i> État du stock</div>
    ${STOCK_DEMO.map(p => {
      const pct = p.stock/Math.max(p.stock,10)*100;
      const level = p.stock === 0 ? 'zero' : p.stock <= p.seuil ? 'low' : 'ok';
      const bLabel = {ok:'En stock',low:'Stock bas',zero:'Rupture'}[level];
      return `<div class="stock-card">
        <div class="stock-icon">${p.icon}</div>
        <div class="stock-info">
          <div class="stock-name">${p.nom}</div>
          <div class="stock-qty ${level}">${p.stock} unité${p.stock>1?'s':''} disponible${p.stock>1?'s':''}</div>
          <div style="height:4px;background:rgba(155,89,182,.1);border-radius:2px;margin-top:6px;">
            <div style="height:100%;width:${pct}%;border-radius:2px;background:${level==='ok'?'var(--green)':level==='low'?'var(--gold)':'var(--red)'}"></div>
          </div>
        </div>
        <div class="stock-badge badge-${level}">${bLabel}</div>
      </div>`;
    }).join('')}`;
}

function renderPerf() {
  const content = document.getElementById('mainContent');
  const stats = Stats.gsStats(session.empId, currentPeriode);
  content.innerHTML = `
    <div class="perf-period">
      ${['jour','semaine','mois'].map(p=>`<button class="period-btn ${p===currentPeriode?'active':''}" onclick="setPeriode('${p}')">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`).join('')}
    </div>
    <div class="perf-big">
      <div class="perf-big-n">${stats.verifications}</div>
      <div class="perf-big-l">Vérifications effectuées ce ${currentPeriode}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div class="stat-mini" style="border-color:rgba(34,197,94,.2)"><div class="stat-mini-n" style="color:var(--green)">${stats.disponibles}</div><div class="stat-mini-l">Disponibles confirmés</div></div>
      <div class="stat-mini" style="border-color:rgba(239,68,68,.2)"><div class="stat-mini-n" style="color:var(--red)">${stats.indisponibles}</div><div class="stat-mini-l">Indisponibles signalés</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
      ${['jour','semaine','mois'].map(p=>{const s=Stats.gsStats(session.empId,p);return`<div class="stat-mini"><div class="stat-mini-n">${s.verifications}</div><div class="stat-mini-l">Ce ${p}</div></div>`;}).join('')}
    </div>`;
}

function setPeriode(p) { currentPeriode = p; renderPerf(); }
function timeAgo(ts) { const d=Math.floor((Date.now()-new Date(ts))/1000); if(d<60)return'il y a '+d+'s'; if(d<3600)return'il y a '+Math.floor(d/60)+'min'; return'il y a '+Math.floor(d/3600)+'h'; }
function showToast(msg, type='success') {
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:${type==='error'?'var(--red)':'var(--purple)'};color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap`;
  t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}

const s = AuthEmp.getSession();
if (!s || s.role !== 'GESTIONNAIRE_STOCK') {
  window.location.href = 'login.html';
}
if (s && s.role === 'GESTIONNAIRE_STOCK') {
  session = s;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').className='app visible';
  document.getElementById('empNameTag').textContent=s.prenom+' '+s.nom;
  showSection('notifs');
  setInterval(refreshBadge,3000); refreshBadge();
}
</script>

  <!-- ═══ SERVICE WORKER ═══ -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[PWA] Service Worker enregistré ✅', reg.scope))
          .catch(err => console.warn('[PWA] SW erreur:', err));
      });
    }
  </script>
  <!-- ═══ FIN SERVICE WORKER ═══ -->
</body>
</html>
